name: Daily AI News

on:
  workflow_dispatch:
  schedule:
    # 09:00 Asia/Seoul, Monday-Friday
    - cron: "0 0 * * 1-5"

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Send digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          OPENAI_MODEL: gpt-5
          MAX_ARTICLES: "8"
          LOOKBACK_HOURS: "24"
        run: python -m src.scheduler
